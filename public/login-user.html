<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

</head>

<body class="login-page">

  <div class="login-card">
    <p id="successMessage" class="success-msg"></p>
    <h2>Student Login</h2>
    <p class="subtitle-student-login">College of Computer Studies</p>

    <input id="student_id" placeholder="ID Number">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
     <p style="text-align:center; margin-top:10px;">
        No account? <a href="register.html">Register</a>
    </p>
  </div>

  <script src="login-user.js"></script>
</body>
</html>
