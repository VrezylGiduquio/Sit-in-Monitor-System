<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Reports</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar sidebar-admin">
      <div class="sidebar-brand">
        <p class="sidebar-kicker">CCS Sit-in</p>
        <h2>Admin Panel</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link" onclick="goTo('home')"><i class="fa-solid fa-house"></i><span>Dashboard</span></button>
        <button class="sidebar-link" onclick="goTo('students')"><i class="fa-solid fa-users"></i><span>Students</span></button>
        <button class="sidebar-link" onclick="goTo('sitin')"><i class="fa-solid fa-calendar-check"></i><span>Reservations</span></button>
        <button class="sidebar-link" onclick="goTo('view-records')"><i class="fa-solid fa-file-lines"></i><span>View Records</span></button>
        <button class="sidebar-link active" onclick="goTo('reports')"><i class="fa-solid fa-file-export"></i><span>Reports</span></button>
        <button class="sidebar-link" onclick="goTo('leaderboard')"><i class="fa-solid fa-trophy"></i><span>Leaderboard</span></button>
        <button class="sidebar-link" onclick="goTo('analytics')"><i class="fa-solid fa-chart-pie"></i><span>Analytics</span></button>
        <button class="sidebar-link" onclick="goTo('software')"><i class="fa-solid fa-upload"></i><span>Software</span></button>
        <button class="sidebar-link" onclick="goTo('ai-recommendation')"><i class="fa-solid fa-wand-magic-sparkles"></i><span>AI Recommendation</span></button>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" onclick="logout()">Logout</button>
      </div>
    </aside>

    <main class="app-content">
      <div class="content-topbar">
        <div>
          <p class="content-kicker">Reports</p>
          <h1 class="content-title">Generate Sit-in Reports</h1>
        </div>
      </div>

      <div class="dashboard-main">
        <section class="hero-panel hero-panel-admin compact-hero">
          <div>
            <p class="eyebrow">Export Center</p>
            <h1>Download or print the latest completed sit-in records</h1>
            <p class="hero-copy">The table below is loaded from the reservation records, so exports stay in sync with your backend data.</p>
          </div>
          <div class="hero-actions">
            <button class="hero-primary" type="button" onclick="downloadReportCsv()">Download CSV</button>
            <button class="hero-secondary" type="button" onclick="window.print()">Print</button>
          </div>
        </section>

        <section class="dashboard-box">
          <div class="dashboard-header">
            <h3><i class="fa-solid fa-file-export"></i> Report Preview</h3>
          </div>
          <div class="dashboard-content">
            <table>
              <thead>
                <tr>
                  <th>Student ID</th>
                  <th>Purpose</th>
                  <th>Room</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="reportsTable"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="reports.js"></script>
</body>
</html>
