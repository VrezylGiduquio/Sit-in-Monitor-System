<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar sidebar-admin">
      <div class="sidebar-brand">
        <p class="sidebar-kicker">CCS Sit-in</p>
        <h2>Admin Panel</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link" onclick="goTo('home')"><i class="fa-solid fa-house"></i><span>Dashboard</span></button>
        <button class="sidebar-link active" onclick="goTo('students')"><i class="fa-solid fa-users"></i><span>Students</span></button>
        <button class="sidebar-link" onclick="goTo('sitin')"><i class="fa-solid fa-calendar-check"></i><span>Reservations</span></button>
        <button class="sidebar-link" onclick="goTo('view-records')"><i class="fa-solid fa-file-lines"></i><span>View Records</span></button>
        <button class="sidebar-link" onclick="goTo('reports')"><i class="fa-solid fa-file-export"></i><span>Reports</span></button>
        <button class="sidebar-link" onclick="goTo('leaderboard')"><i class="fa-solid fa-trophy"></i><span>Leaderboard</span></button>
        <button class="sidebar-link" onclick="goTo('analytics')"><i class="fa-solid fa-chart-pie"></i><span>Analytics</span></button>
        <button class="sidebar-link" onclick="goTo('software')"><i class="fa-solid fa-upload"></i><span>Software</span></button>
        <button class="sidebar-link" onclick="goTo('ai-recommendation')"><i class="fa-solid fa-wand-magic-sparkles"></i><span>AI Recommendation</span></button>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" onclick="logout()">Logout</button>
      </div>
    </aside>

    <main class="app-content">
      <div class="content-topbar">
        <div>
          <p class="content-kicker">Administrator</p>
          <h1 class="content-title">Students</h1>
        </div>
      </div>

      <div class="dashboard-main">
        <section class="hero-panel hero-panel-admin compact-hero">
          <div>
            <p class="eyebrow">Student Management</p>
            <h1>Manage student accounts and remaining sessions</h1>
            <p class="hero-copy">Search students, review remaining sessions, and update account details from one clean workspace.</p>
          </div>
        </section>

        <section class="dashboard-box dashboard-box-full">
          <div class="dashboard-header">
            <h3><i class="fa-solid fa-users"></i> Student Directory</h3>
          </div>
          <div class="dashboard-content">
            <div class="table-controls">
              <button style="background: rgb(28, 182, 243); padding: 0.8rem;">
                <i class="fa-solid fa-plus"></i> Add Student
              </button>
              <input
                type="text"
                id="searchInput"
                placeholder="Search by ID or Name..."
                onkeyup="searchStudents()"
              >
            </div>

            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Year</th>
                  <th>Course</th>
                  <th>Remaining</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="table"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <h2>Edit Student</h2>
      <form id="editForm">
        <input type="hidden" id="edit_student_id">
        <label>First Name:</label>
        <input type="text" id="edit_first_name" required>
        <label>Last Name:</label>
        <input type="text" id="edit_last_name" required>
        <label>Middle Name:</label>
        <input type="text" id="edit_middle_name">
        <label>Course Level:</label>
        <input type="text" id="edit_course_level">
        <label>Course:</label>
        <input type="text" id="edit_course">
        <label>Email:</label>
        <input type="email" id="edit_email">
        <label>Remaining Sessions:</label>
        <input type="number" id="edit_remaining_sessions" min="0">
        <button type="submit">Save Changes</button>
      </form>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
