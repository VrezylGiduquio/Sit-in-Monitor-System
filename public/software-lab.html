<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Software / Lab</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <p class="sidebar-kicker">CCS Sit-in</p>
        <h2>Student Panel</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link" onclick="window.location.href='user.html'"><i class="fa-solid fa-house"></i><span>Dashboard</span></button>
        <button class="sidebar-link" onclick="window.location.href='reservation.html'"><i class="fa-solid fa-calendar-check"></i><span>Reservations</span></button>
        <button class="sidebar-link" onclick="window.location.href='sessions.html'"><i class="fa-solid fa-table-list"></i><span>My Sessions</span></button>
        <button class="sidebar-link active" onclick="window.location.href='software-lab.html'"><i class="fa-solid fa-desktop"></i><span>Software / Lab</span></button>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" onclick="logout()">Logout</button>
      </div>
    </aside>

    <main class="app-content">
      <div class="content-topbar">
        <p class="content-kicker">Student Workspace</p>
        <h1 class="content-title">Software / Lab</h1>
      </div>
      <div class="dashboard-main">
        <section class="dashboard-box dashboard-box-full">
          <div class="dashboard-header">
            <h3><i class="fa-solid fa-desktop"></i> Software Availability / Lab</h3>
          </div>
          <div class="dashboard-content">
            <div class="availability-grid" id="labAvailability"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="user.js" defer></script>
</body>
</html>
