<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Reservations</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
    .tabs button { background: #eef2f7; color: #172033; border: 1px solid #dbe3ef; }
    .tabs button.active-tab { background: #0f766e; color: white; border-color: #0f766e; }
    button.approve-btn { background: #0f766e; color: white; }
    button.approve-btn:hover { background: #115e59; }
  </style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar sidebar-admin">
      <div class="sidebar-brand">
        <p class="sidebar-kicker">CCS Sit-in</p>
        <h2>Admin Panel</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link" onclick="goTo('home')"><i class="fa-solid fa-house"></i><span>Dashboard</span></button>
        <button class="sidebar-link" onclick="goTo('students')"><i class="fa-solid fa-users"></i><span>Students</span></button>
        <button class="sidebar-link active" onclick="goTo('sitin')"><i class="fa-solid fa-calendar-check"></i><span>Reservations</span></button>
        <button class="sidebar-link" onclick="goTo('view-records')"><i class="fa-solid fa-file-lines"></i><span>View Records</span></button>
        <button class="sidebar-link" onclick="goTo('reports')"><i class="fa-solid fa-file-export"></i><span>Reports</span></button>
        <button class="sidebar-link" onclick="goTo('leaderboard')"><i class="fa-solid fa-trophy"></i><span>Leaderboard</span></button>
        <button class="sidebar-link" onclick="goTo('analytics')"><i class="fa-solid fa-chart-pie"></i><span>Analytics</span></button>
        <button class="sidebar-link" onclick="goTo('software')"><i class="fa-solid fa-upload"></i><span>Software</span></button>
        <button class="sidebar-link" onclick="goTo('ai-recommendation')"><i class="fa-solid fa-wand-magic-sparkles"></i><span>AI Recommendation</span></button>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" onclick="logout()">Logout</button>
      </div>
    </aside>

    <main class="app-content">
      <div class="content-topbar">
        <div>
          <p class="content-kicker">Reservations</p>
          <h1 class="content-title">Manage Reservations</h1>
        </div>
      </div>

      <div class="dashboard-main">
        <section class="dashboard-box">
          <div class="dashboard-header">
            <h3><i class="fa-solid fa-calendar-check"></i> Reservation Queue</h3>
          </div>
          <div class="dashboard-content">
            <div class="tabs">
              <button id="pendingTab" class="active-tab">Pending</button>
              <button id="ongoingTab">Ongoing</button>
            </div>

            <table>
              <thead>
                <tr>
                  <th>Student ID</th>
                  <th>Purpose</th>
                  <th>Room</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="reservationTable"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

<script>
let currentStatus = "pending";

const pendingTab = document.getElementById("pendingTab");
const ongoingTab = document.getElementById("ongoingTab");
const tableBody = document.getElementById("reservationTable");

pendingTab.addEventListener("click", () => switchTab("pending"));
ongoingTab.addEventListener("click", () => switchTab("ongoing"));

function switchTab(status) {
    currentStatus = status;
    pendingTab.classList.toggle("active-tab", status === "pending");
    ongoingTab.classList.toggle("active-tab", status === "ongoing");
    loadReservations();
}

async function loadReservations() {
    try {
        const res = await fetch(`/admin/reservations?status=${currentStatus}`);
        const data = await res.json();

        tableBody.innerHTML = "";

        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center">No ${currentStatus} reservations</td></tr>`;
            return;
        }

        data.forEach(r => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${r.student_id}</td>
                <td>${r.purpose}</td>
                <td>${r.room}</td>
                <td>${r.date}</td>
                <td>${r.start_time} - ${r.end_time}</td>
                <td>${r.status}</td>
                <td>
                    ${
                        r.status === 'pending'
                        ? `<button class="approve-btn" onclick="approveReservation(${r.id})">Approve</button>`
                        : r.status === 'ongoing'
                        ? `<button class="approve-btn" style="background:red;" onclick="terminateReservation(${r.id})">Terminate</button>`
                        : ''
                    }
                    </td>
            `;
            tableBody.appendChild(row);
        });
    } catch (err) {
        console.error(err);
    }
}

async function approveReservation(id) {
    try {
        const res = await fetch(`/admin/reservations/approve/${id}`, { method: "POST" });
        const data = await res.json();
        if (data.success) {
            loadReservations(); // refresh current tab
        } else {
            alert(data.message);
        }
    } catch (err) {
        console.error(err);
    }
}

async function terminateReservation(id) {
    try {
        const res = await fetch(`/admin/reservations/terminate/${id}`, {
            method: "POST"
        });

        const data = await res.json();

        if (data.success) {
            loadReservations(); // refresh table
        } else {
            alert(data.message);
        }
    } catch (err) {
        console.error(err);
    }
}

// Initial load
loadReservations();
  
function goTo(url) {
    localStorage.setItem("activeRole", "admin");
    // Navigate to the page
    if(url == "home"){ window.location.href = "admin.html";}
    else if(url == "leaderboard"){ window.location.href = "leaderboard.html?role=admin";}
    else{ window.location.href = url + ".html";}
}
// Dummy navigation/logout

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

</script>
</body>
</html>
