<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CCS Student Registration</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

  <div class="card register-card">

    <div class="register-icon">🧑‍🎓</div>
    <h2>CCS Student Registration</h2>
    <p class="subtitle">College of Computer Studies</p>

    <div class="form-grid">

      <div class="form-group">
        <label>ID Number</label>
        <input id="student_id" placeholder="Enter ID">
      </div>

      <div class="form-group">
        <label>Course</label>
        <select id="course">
          <option value="">Select Course</option>
          <option value="BSIT">BSIT</option>
          <option value="BSCS">BSCS</option>
        </select>
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input id="last_name" placeholder="Last Name">
      </div>

      <div class="form-group">
        <label>First Name</label>
        <input id="first_name" placeholder="First Name">
      </div>

      <div class="form-group">
        <label>Middle Name</label>
        <input id="middle_name" placeholder="Optional">
      </div>

      <div class="form-group">
        <label>Year Level</label>
        <select id="course_level">
          <option value="">Select Year</option>
          <option value="1st Year">1st Year</option>
          <option value="2nd Year">2nd Year</option>
          <option value="3rd Year">3rd Year</option>
          <option value="4th Year">4th Year</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Email</label>
        <input id="email" placeholder="Enter Email">
      </div>

      <div class="form-group full">
        <label>Address</label>
        <input id="address" placeholder="Enter Address">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Password">
      </div>

      <div class="form-group">
        <label>Repeat Password</label>
        <input id="repeat_password" type="password" placeholder="Repeat Password">
      </div>

    </div>

    <button onclick="register()" class="register-btn">Register</button>

  </div>

  <script src="register.js"></script>
</body>
</html>
