<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <div class="nav-left">
    <h2>CCS Sit-in Monitoring System Student Dashboard</h2>
  </div>

  <nav id="navLinks" class="nav-links"></nav>

  <div class="nav-right">
    <button onclick="logout()">Logout</button>
  </div>
</header>

<main>
  <div class="dashboard-container">

    <!-- STUDENT INFORMATION CARD (your existing code) -->
    <section class="dashboard-box">
    <div class="dashboard-header">
      <h3><i class="fa-solid fa-clock-rotate-left"></i> My Sit-in History</h3>
    </div>

    <div class="dashboard-content">
      <table>
        <thead>
          <tr>
            <th>Purpose</th>
            <th>Room</th>
            <th>Date</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </section>

    <!-- RESERVE SIT-IN BUTTON -->
    <section class="dashboard-box">
      <div class="dashboard-header">
        <h3>Reserve a Sit-in</h3>
      </div>
      <div class="dashboard-content">
        <button onclick="openModal()">Reserve Sit-in</button>
      </div>
    </section>

    <!-- RESERVATIONS TABLE -->
    <section class="dashboard-box">
      <div class="dashboard-header">
        <h3>My Reservations</h3>
      </div>
      <div class="dashboard-content">
        <table>
          <thead>
            <tr>
              <th>Purpose</th>
              <th>Room</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="reservationTable"></tbody> <!-- ✅ Table will be populated by JS -->
        </table>
      </div>
    </section>

  </div>
</main>

<!-- RESERVATION MODAL -->
<div id="reservationModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3>Reserve Sit-in</h3>

    <input type="text" id="purpose" placeholder="Enter subject">

    <select id="room">
      <option value="">Select Room</option>
      <option value="524">524</option>
      <option value="526">526</option>
      <option value="528">528</option>
      <option value="530">530</option>
      <option value="542">542</option>
      <option value="544">544</option>
    </select>

    <input type="date" id="date">
    <input type="time" id="start_time">
    <input type="time" id="end_time">

    <button onclick="submitReservation()">Submit</button>
    <p id="modalMessage"></p>
  </div>
</div>

<script src="reservation.js" defer></script>
</body>
</html>
